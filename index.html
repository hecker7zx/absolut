<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absolut Raspberri — Experience the Extraordinary</title>
    <meta name="description" content="Absolut Raspberri. A cinematic experience of premium Swedish vodka infused with natural raspberry flavor.">
    <meta property="og:title" content="Absolut Raspberri — Experience the Extraordinary">
    <meta property="og:description" content="Premium Swedish vodka. Bold raspberry character. Unexpected by design.">
    <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
        }
    }
    </script>

    <!-- GSAP + ScrollTrigger -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.13/dist/lenis.min.js"></script>
</head>
<body>
    <!-- ========== Loading Screen ========== -->
    <div class="loader" id="loader">
        <div class="loader-inner">
            <div class="loader-logo">ABSOLUT</div>
            <div class="loader-subtitle">RASPBERRI</div>
            <div class="loader-bar">
                <div class="loader-progress" id="loader-progress"></div>
            </div>
        </div>
    </div>

    <!-- ========== 3D Canvas ========== -->
    <canvas id="bottle-canvas"></canvas>

    <!-- ========== Cinematic Vignette ========== -->
    <div class="vignette" id="vignette"></div>

    <!-- ========== Navigation ========== -->
    <nav class="nav" id="nav">
        <div class="nav-logo magnetic" data-cursor>ABSOLUT</div>
    </nav>

    <!-- ========== Scroll Prompt ========== -->
    <div class="scroll-prompt" id="scroll-prompt">
        <span class="scroll-prompt-text">Scroll to begin</span>
        <div class="scroll-prompt-line"></div>
    </div>

    <!-- ========== Scene 1 ========== -->
    <div class="scene-text" id="text-1">
        <div class="text-inner">
            <span class="scene-number">01</span>
            <h2 class="scene-heading">
                <span class="line"><span class="line-inner">Crafted To Be</span></span>
                <span class="line"><span class="line-inner">Different</span></span>
            </h2>
            <div class="scene-divider"></div>
        </div>
    </div>

    <!-- ========== Scene 2 ========== -->
    <div class="scene-text" id="text-2">
        <div class="text-inner">
            <span class="scene-number">02</span>
            <h2 class="scene-heading">
                <span class="line"><span class="line-inner">Bold Raspberry</span></span>
                <span class="line"><span class="line-inner">Character</span></span>
            </h2>
            <div class="scene-divider"></div>
        </div>
    </div>

    <!-- ========== Scene 3 ========== -->
    <div class="scene-text" id="text-3">
        <div class="text-inner">
            <span class="scene-number">03</span>
            <h2 class="scene-heading">
                <span class="line"><span class="line-inner">Exceptionally</span></span>
                <span class="line"><span class="line-inner">Smooth</span></span>
            </h2>
            <div class="scene-divider"></div>
        </div>
    </div>

    <!-- ========== Scene 4 ========== -->
    <div class="scene-text" id="text-4">
        <div class="text-inner">
            <span class="scene-number">04</span>
            <h2 class="scene-heading">
                <span class="line"><span class="line-inner">Unexpected</span></span>
                <span class="line"><span class="line-inner">By Design</span></span>
            </h2>
            <div class="scene-divider"></div>
        </div>
    </div>

    <!-- ========== Scene 5 (Final Reveal) ========== -->
    <div class="scene-text scene-text-final" id="text-5">
        <div class="text-inner">
            <h2 class="scene-heading scene-heading-final">
                <span class="line"><span class="line-inner">Absolut</span></span>
                <span class="line"><span class="line-inner"><em>Raspberri</em></span></span>
            </h2>
        </div>
    </div>

    <!-- ========== Progress Bar ========== -->
    <div class="progress-bar" id="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- ========== Scroll Spacer ========== -->
    <div id="scroll-spacer"></div>

    <!-- ========== App ========== -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
